    canvas.style.width=(W*s)+'px';canvas.style.height=(H*s)+'px';
    // backing store scaling for high-DPR devices
    const dpr = window.devicePixelRatio || 1;
    canvas.width = Math.round(W * dpr);

function getAC(){return _ac||(_ac=new(window.AudioContext||window.webkitAudioContext)());}
let muted=false;
let soundUnlocked=false;
function tone(f,type,dur,vol,fe){
  if(muted) return; // respect mute
  try{const ac=getAC();const o=ac.createOscillator(),g=ac.createGain();
    o.type=type;o.frequency.value=f;
    if(fe)o.frequency.exponentialRampToValueAtTime(fe,ac.currentTime+dur);
    g.gain.setValueAtTime(vol,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
    o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+dur);
  }catch(e){}
}
let _lastShoot=0;

// audio helper: try to play an audio element by id, fallback to tone sequence
function audioBufferToWav(buffer, opt) {
  opt = opt || {}
  var numChannels = buffer.numberOfChannels
  var sampleRate = buffer.sampleRate
  var format = opt.float32 ? 3 : 1
  var bitDepth = format === 3 ? 32 : 16

  var result
  if (numChannels === 2) {
    result = interleave(buffer.getChannelData(0), buffer.getChannelData(1))
  } else {
    result = buffer.getChannelData(0)
  }

  return encodeWAV(result, format, sampleRate, numChannels, bitDepth)

  function interleave(inputL, inputR) {
    var length = inputL.length + inputR.length
    var result = new Float32Array(length)

    var index = 0
    var inputIndex = 0

    while (index < length) {
      result[index++] = inputL[inputIndex]
      result[index++] = inputR[inputIndex]
      inputIndex++
    }
    return result
  }

  function floatTo16BitPCM(output, offset, input) {
    for (var i = 0; i < input.length; i++, offset += 2) {
      var s = Math.max(-1, Math.min(1, input[i]))
      output.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true)
    }
  }

  function writeString(view, offset, string) {
    for (var i = 0; i < string.length; i++) {
      view.setUint8(offset + i, string.charCodeAt(i))
    }
  }

  function encodeWAV(samples, format, sampleRate, numChannels, bitDepth) {
    var bytesPerSample = bitDepth / 8
    var blockAlign = numChannels * bytesPerSample

    var buffer = new ArrayBuffer(44 + samples.length * bytesPerSample)
    var view = new DataView(buffer)

    /* RIFF identifier */
    writeString(view, 0, 'RIFF')
    /* file length */
    view.setUint32(4, 36 + samples.length * bytesPerSample, true)
    /* RIFF type */
    writeString(view, 8, 'WAVE')
    /* format chunk identifier */
    writeString(view, 12, 'fmt ')
    /* format chunk length */
    view.setUint32(16, 16, true)
    /* sample format (raw) */
    view.setUint16(20, format, true)
    /* channel count */
    view.setUint16(22, numChannels, true)
    /* sample rate */
    view.setUint32(24, sampleRate, true)
    /* byte rate (sample rate * block align) */
    view.setUint32(28, sampleRate * blockAlign, true)
    /* block align (channel count * bytes per sample) */
    view.setUint16(32, blockAlign, true)
    /* bits per sample */
    view.setUint16(34, bitDepth, true)
    /* data chunk identifier */
    writeString(view, 36, 'data')
    /* data chunk length */
    view.setUint32(40, samples.length * bytesPerSample, true)

    if (format === 1) {
      floatTo16BitPCM(view, 44, samples)
    } else {
      var offset = 44
      for (var i = 0; i < samples.length; i++, offset += 4) {
        view.setFloat32(offset, samples[i], true)
      }
    }

    return new Blob([view], { type: 'audio/wav' })
  }
}

async function generateAudioBlob(freqs){
  // freqs: array of {freq,dur,type}
  const sampleRate = 44100
  const totalTime = freqs.reduce((s,f)=>s+f.dur,0)
  const offline = new OfflineAudioContext(1, Math.ceil(totalTime*sampleRate), sampleRate)
  let t=0
  for(const f of freqs){
    const o = offline.createOscillator(); const g = offline.createGain();
    o.type = f.type||'sine'; o.frequency.value = f.freq; g.gain.setValueAtTime(f.vol||0.2, t);
    o.connect(g); g.connect(offline.destination);
    o.start(t); o.stop(t+f.dur);
    t += f.dur;
  }
  const buf = await offline.startRendering();
  return audioBufferToWav(buf);
}

function tryPlayAudio(id, fallbackFn){
  try{
    const el = document.getElementById(id);
    if(!el) { if(fallbackFn) fallbackFn(); return; }
    // If there is a real external src, try HEAD; otherwise generate a short blob audio and play
    if(el.src && !el.src.endsWith('audio/'+id+'.mp3')){
      fetch(el.src, {method:'HEAD'}).then(r=>{ if(r.ok){ el.currentTime=0; el.play().catch(()=>{ if(fallbackFn)fallbackFn(); }); } else { if(fallbackFn)fallbackFn(); }}).catch(()=>{ if(fallbackFn)fallbackFn(); });
      return;
    }
    // If element has no real file, synthesize a small clip and set as src
    (async ()=>{
      try{
        if(id==='audioLife'){
          const blob = await generateAudioBlob([{freq:620,dur:0.12,type:'triangle',vol:0.16},{freq:740,dur:0.12,type:'triangle',vol:0.16},{freq:880,dur:0.12,type:'triangle',vol:0.16}]);
          el.src = URL.createObjectURL(blob); el.currentTime=0; el.play().catch(()=>{ if(fallbackFn)fallbackFn(); });
        } else if(id==='audioApex'){
          const seq=[]; for(let i=0;i<5;i++){seq.push({freq:320+(i*80),dur:0.18,type:'triangle',vol:0.18});}
          const blob = await generateAudioBlob(seq);
          el.src = URL.createObjectURL(blob); el.currentTime=0; el.play().catch(()=>{ if(fallbackFn)fallbackFn(); });
        } else { if(fallbackFn) fallbackFn(); }
      }catch(e){ if(fallbackFn) fallbackFn(); }
    })();
  }catch(e){ if(fallbackFn)fallbackFn(); }
}

function applyDifficulty(){
  // update breath settings from controls if present (live)
  try{const bv = document.getElementById('breathVol'); if(bv) breathVolume = parseInt(bv.value,10)/100;}catch(e){}
  try{const bs = document.getElementById('breathSpeed'); if(bs) breathSpeed = parseInt(bs.value,10);}catch(e){}
  try{const am = document.getElementById('apexMode'); if(am) apexMode = am.value;}catch(e){}
  // read level10 tuning
  try{const l10hp = document.getElementById('l10hp'); if(l10hp){ l10HpMul = parseInt(l10hp.value,10)/100; localStorage.setItem('dino-l10hp', l10hp.value);} }catch(e){}
  try{const l10proj = document.getElementById('l10proj'); if(l10proj){ l10ProjMul = parseInt(l10proj.value,10)/100; localStorage.setItem('dino-l10proj', l10proj.value);} }catch(e){}
  try{const am = document.getElementById('apexMode'); if(am) localStorage.setItem('dino-apex-mode', am.value);}catch(e){}
  // build LEVEL_CFG from BASE_LEVEL_CFG applying multipliers
  const diff=currentDifficulty;
  LEVEL_CFG=[null];
  for(let i=1;i<=MAX_LEVEL;i++){
    const b=BASE_LEVEL_CFG[i];
    if(!b){LEVEL_CFG[i]=null;continue;}
    // base multipliers
    let hpMul=1,speedMul=1,spawnMul=1,fireMul=1,killsMul=1;
    if(diff==='easy'){hpMul=0.75; speedMul=0.9; spawnMul=1.05; fireMul=1.25; killsMul=1.4}
    else if(diff==='hard'){hpMul=1.25; speedMul=1.08; spawnMul=0.95; fireMul=0.85; killsMul=0.9}
    // practice mode reduces HP and makes boss appear earlier
    if(practiceMode){hpMul*=0.55; killsMul*=0.6; spawnMul*=1.1;}
    // special apex mode adjustments (only affects level 10)
    if(i===10){
      if(apexMode==='easier'){hpMul*=0.78; speedMul*=0.9; fireMul*=1.15; spawnMul*=1.05;}
      else if(apexMode==='superhard'){hpMul*=1.25; speedMul*=1.12; fireMul*=0.85; spawnMul*=0.95;}
      // apply user tuning sliders
      if(typeof l10HpMul!=='undefined') hpMul *= l10HpMul;
      if(typeof l10ProjMul!=='undefined') b.bossProjSpeed = Math.round(b.bossProjSpeed * l10ProjMul);
    }
    LEVEL_CFG[i]=Object.assign({},b);
    LEVEL_CFG[i].bossHP = Math.max(1,Math.round(b.bossHP * hpMul));
    LEVEL_CFG[i].enemySpeedMult = b.enemySpeedMult * speedMul;
    LEVEL_CFG[i].spawnBase = Math.max(14, Math.round(b.spawnBase * spawnMul));
    LEVEL_CFG[i].bossFireRate = Math.max(8, Math.round(b.bossFireRate * fireMul));
    LEVEL_CFG[i].bossProjSpeed = Math.max(1, Math.round(b.bossProjSpeed * (1 + (speedMul-1)*0.5)));
    LEVEL_CFG[i].killsForBoss = Math.max(3, Math.round(b.killsForBoss * killsMul));
  }
}

function drawCat(cx,cy){
  const x = cx + recoil, y = cy;
  // breathing scale from cat.breathTimer to add subtle chest movement
  const breath = 1 + 0.012 * Math.sin((frame + (cat.breathTimer%360)) * 0.06);
  const bob = Math.sin(frame*0.06)*1.6;
  ctx.save(); ctx.translate(x, y + bob);
  ctx.scale(breath, breath);

  // appearance palette (adjusted per appearance elsewhere)
  const base1 = (appearance==='fierce')? '#8b2b2b' : (appearance==='cute')? '#8fbf6b' : '#2b8fb8';
  const base2 = (appearance==='fierce')? '#5a1b1b' : (appearance==='cute')? '#6aa95a' : '#18677f';
  const belly = (appearance==='cute')? '#fff6e8' : '#d6eef4';
  const scaleCol = (appearance==='fierce')? '#7a3b3b' : '#1b6b8a';
  const eyeCol = (appearance==='fierce')? '#ffb33b' : '#ffcc33';

  // dynamic jaw opening influenced by mouthTimer (when shooting) and breathing
  const mouthOpen = Math.max(0, (cat.mouthTimer||0)/6) + (1 + Math.max(0, Math.sin(frame*0.18))*1.8);

  // subtle body gradient
  const g = ctx.createLinearGradient(-40,-20,40,30);
  g.addColorStop(0, base2); g.addColorStop(0.6, base1); g.addColorStop(1,'#75c7dc');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.ellipse(0, 0, 52, 32, -0.06, 0, Math.PI*2); ctx.fill();

  // belly with softer gradient
  const g2 = ctx.createLinearGradient(0,-4,0,26); g2.addColorStop(0, 'rgba(255,255,255,0.28)'); g2.addColorStop(1, belly);
  ctx.fillStyle = g2; ctx.beginPath(); ctx.ellipse(10, 12, 30, 16, 0, 0, Math.PI*2); ctx.fill();

  // soft shadow under dino
  ctx.fillStyle = 'rgba(0,0,0,0.28)'; ctx.beginPath(); ctx.ellipse(6, 44, 70, 18, 0, 0, Math.PI*2); ctx.fill();

  // lightweight scales texture (stipple + semicircles) for realism
  ctx.fillStyle = scaleCol; ctx.globalAlpha = 0.28;
  for(let r=0;r<4;r++){
    const oy = -10 + r*7;
    for(let i=-34;i<34;i+=8){
      const sx = i + ((r%2)?4:0);
      ctx.beginPath(); ctx.arc(sx, oy, 3.2 - r*0.25, Math.PI, 2*Math.PI); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;

  // tail with better curvature and slight wave
  ctx.fillStyle = base2; ctx.beginPath();
  ctx.moveTo(-46, 8);
  ctx.bezierCurveTo(-86, 10, -120, -10, -132, -30);
  ctx.bezierCurveTo(-120, -18, -88, -6, -48, -18);
  ctx.closePath(); ctx.fill();
  // subtle tail bands
  ctx.strokeStyle = 'rgba(0,0,0,0.06)'; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(-44,14); ctx.quadraticCurveTo(-88,10,-118,-8); ctx.stroke();

  // hind leg (powerful) and foreleg (stance)
  ctx.fillStyle = base2; ctx.beginPath(); ctx.ellipse(-6,38,20,22,0.14,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(18,28,14,18,0.24,0,Math.PI*2); ctx.fill();
  // claws
  ctx.fillStyle = '#222'; [[-2,50],[-8,50],[-14,50]].forEach(p=>{ctx.beginPath();ctx.ellipse(p[0],p[1],4.6,3.6,0,0,Math.PI*2);ctx.fill();});
  [[22,40],[16,40],[10,40]].forEach(p=>{ctx.beginPath();ctx.ellipse(p[0],p[1],3.8,2.8,0,0,Math.PI*2);ctx.fill();});

  // dorsal plates/scales (more organic)
  for(let i=0;i<8;i++){
    const sx = -26 + i*13;
    const sy = -18 + Math.sin(frame*0.11 + i*0.6)*2.2;
    ctx.beginPath(); ctx.ellipse(sx, sy, 8, 12 - (i%2), -0.18, 0, Math.PI*2);
    ctx.fillStyle = (i%2? '#2fa3c6' : '#174f5f'); ctx.fill();
  }

  // neck and head with jaw animation for realism
  const headY = -24 + Math.sin(frame*0.08)*1.2;
  ctx.fillStyle = base1; ctx.beginPath(); ctx.ellipse(48, headY, 28, 22, -0.14, 0, Math.PI*2); ctx.fill();
  // jaw opening slightly when moving and when shooting
  ctx.fillStyle = belly; ctx.beginPath(); ctx.ellipse(66, -6 + mouthOpen*0.6, 22, 11 + mouthOpen*0.35, 0.12, 0, Math.PI*2); ctx.fill();

  // nostril and nasal ridge
  ctx.fillStyle = '#153c3f'; ctx.beginPath(); ctx.ellipse(60, -32, 2.2, 1.2, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(66, -31, 1.6, 1.0, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.06)'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(54, -36); ctx.quadraticCurveTo(60, -38, 68, -34); ctx.stroke();

  // eye with wetness
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.ellipse(50, -28, 6.5, 5.2, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = eyeCol; ctx.beginPath(); ctx.ellipse(52, -28, 3.6, 3, 0, 0, Math.PI*2); ctx.fill();
  // vertical pupil
  ctx.fillStyle = '#07130b'; ctx.beginPath(); ctx.ellipse(52.4, -28, 1.0, 3.6, 0, 0, Math.PI*2); ctx.fill();
  // highlight
  ctx.fillStyle = 'rgba(255,255,255,0.95)'; ctx.beginPath(); ctx.arc(54, -30, 1.0, 0, Math.PI*2); ctx.fill();

  // teeth (upper row and lower row) — small triangles with slight random for life
  ctx.fillStyle = '#fff';

    ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(tx+3.5, ty-7); ctx.lineTo(tx-2.5, ty-2); ctx.closePath(); ctx.fill();
  }
  // lower small teeth (less visible)
  for(let t=0;t<4;t++){
    const tx = 50 + t*5 + Math.sin(frame*0.3 + t)*0.2;
    const ty = 2 + Math.cos(t*0.6)*0.3;
    ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(tx+2.6, ty+4.8); ctx.lineTo(tx-2.6, ty+4.8); ctx.closePath(); ctx.fill();
  }

  // subtle cheek shading and small scars for character
  ctx.fillStyle = 'rgba(0,0,0,0.06)'; ctx.beginPath(); ctx.ellipse(44, -8, 22, 11, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(255,80,80,0.9)'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(40, -36); ctx.lineTo(54, -20); ctx.stroke();

  ctx.restore();
}

  ctx.fillStyle=bdc;ctx.beginPath();ctx.ellipse(-22,26,18,14,0.4,0,Math.PI*2);ctx.fill();
  // arms+claws
  ctx.fillStyle=bdc;ctx.beginPath();ctx.ellipse(30,16,14,22,-0.2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#c0c0c0';
  [-6,2,11].forEach(ox=>{ctx.beginPath();ctx.moveTo(ox+28,42);ctx.lineTo(ox+25,56);ctx.lineTo(ox+33,54);ctx.closePath();ctx.fill();});
  // neck+head
  ctx.fillStyle=bc;ctx.beginPath();ctx.ellipse(32,-18,16,18,-0.25,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(42,-38,28,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=p2?'#6a2222':'#3a3a3a';ctx.beginPath();ctx.ellipse(44,-46,18,12,-0.2,0,Math.PI*2);ctx.fill();
  // torn ears
  ctx.fillStyle=bdc;
  ctx.beginPath();ctx.moveTo(26,-56);ctx.lineTo(18,-78);ctx.lineTo(24,-70);ctx.lineTo(17,-82);ctx.lineTo(28,-74);ctx.lineTo(32,-58);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(44,-60);ctx.lineTo(48,-82);ctx.lineTo(54,-72);ctx.lineTo(50,-84);ctx.lineTo(61,-70);ctx.lineTo(58,-58);ctx.closePath();ctx.fill();
  // horns
  [[28,-58],[42,-62],[56,-58]].forEach(([hx,hy])=>{ctx.beginPath();ctx.moveTo(hx-7,hy);ctx.lineTo(hx,hy-22);ctx.lineTo(hx+7,hy);ctx.closePath();ctx.fillStyle=hc;ctx.fill();});
  // eyes (no shadowBlur)
  // eyes — gold for demon rat, red otherwise
  const eyeCol=cfg3?(p2?'#ffdd00':'#ddaa00'):'#ff2020';
  ctx.fillStyle=eyeCol;ctx.beginPath();ctx.arc(50,-42,10,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=cfg3?'#664400':'#660000';ctx.beginPath();ctx.arc(50,-42,6,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,200,200,0.5)';ctx.beginPath();ctx.arc(52,-44,2.5,0,Math.PI*2);ctx.fill();
  // scar
  ctx.strokeStyle='rgba(255,80,80,0.8)';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(42,-52);ctx.lineTo(60,-32);ctx.stroke();
  // fangs
  ctx.fillStyle='#e0e0e0';ctx.fillRect(64,-18,8,16);ctx.fillRect(74,-18,7,13);
  // hit flash
  if(b.hit>0){ctx.fillStyle=`rgba(255,255,255,${b.hit/8*0.6})`;ctx.beginPath();ctx.ellipse(10,-15,70,55,0,0,Math.PI*2);ctx.fill();}
  ctx.restore();
}

// ── DRAW: BULLETS ──────────────────────────────────────────────────────────
function drawBullets(){
  bullets.forEach(b=>{
    const lv=b.lvl||1,r=b.r||4;
    const col=lv===4?`hsl(${(frame*3+b.y)%360},100%,72%)`:GUN_CFG[lv].col;
    ctx.fillStyle=col;
    ctx.beginPath();ctx.ellipse(b.x,b.y,r*3,r,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,210,80,0.2)';
    ctx.beginPath();ctx.ellipse(b.x-20,b.y,r*2,r*.7,0,0,Math.PI*2);ctx.fill();
  });
}

// ── DRAW: BOSS PROJECTILE ──────────────────────────────────────────────────
function drawBossProj(p){
  const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*2.6);
  g.addColorStop(0,'rgba(255,220,80,1)');g.addColorStop(0.4,'rgba(255,70,10,0.8)');g.addColorStop(1,'rgba(180,0,0,0)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,p.y,p.r*2.6,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ffffa0';ctx.beginPath();ctx.arc(p.x,p.y,p.r*.5,0,Math.PI*2);ctx.fill();
}

// ── DRAW: MUZZLE FLASH ─────────────────────────────────────────────────────
function drawMuzzleFlash(){
  if(mFlash<=0.05)return;
  ctx.save();ctx.globalAlpha=mFlash;
  const g=ctx.createRadialGradient(mFlashX,mFlashY,0,mFlashX,mFlashY,32*mFlash);
  g.addColorStop(0,'rgba(255,255,200,1)');g.addColorStop(0.35,'rgba(255,170,40,0.8)');g.addColorStop(1,'rgba(255,60,0,0)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(mFlashX,mFlashY,32*mFlash,0,Math.PI*2);ctx.fill();
  ctx.restore();mFlash*=0.5;
}

// ── DRAW: CASINGS ──────────────────────────────────────────────────────────
function drawCasings(){
  casings.forEach(c=>{
    ctx.save();ctx.globalAlpha=Math.min(c.life*2,1);
    ctx.translate(c.x,c.y);ctx.rotate(c.angle);
    ctx.fillStyle='#c89a18';ctx.fillRect(-5,-2,10,4);
    ctx.restore();
  });
}

// ── DRAW: PARTICLES ────────────────────────────────────────────────────────
function drawParticles(){
  ctx.save();
  particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life+0.5,0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;ctx.restore();
}

// ── DRAW: POWER-UP ─────────────────────────────────────────────────────────
function drawPowerup(p){
  const bob=Math.sin(frame*0.09+p.bobPhase)*8;
  ctx.save();ctx.globalAlpha=p.collected?p.life:1;
  ctx.translate(p.x,p.y+bob);
  const sc=p.collected?1+p.collectAnim*0.4:1;ctx.scale(sc,sc);
  ctx.fillStyle=`rgba(255,160,0,${0.25+0.15*Math.sin(frame*0.14+p.bobPhase)})`;
  ctx.beginPath();ctx.arc(0,0,26,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#7a3b10';ctx.fillRect(-20,-16,40,32);
  ctx.fillStyle='#d4a020';ctx.fillRect(-20,-4,40,8);ctx.fillRect(-5,-16,10,32);
  ctx.fillStyle='#f0c030';
  [[-15,-11],[11,-11],[-15,9],[11,9]].forEach(([rx,ry])=>{ctx.beginPath();ctx.arc(rx,ry,3,0,Math.PI*2);ctx.fill();});
  ctx.fillStyle = p.type==='life' ? '#ff6b6b' : '#ffee00';
  ctx.font='bold 18px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(p.type==='life' ? '❤️' : '⚡',0,0);
  ctx.restore();
}

// ── DRAW: BOSS HP BAR ──────────────────────────────────────────────────────
function drawBossHPBar(b){
  if(!b||b.dead)return;
  const pct=clamp(b.hp/b.maxHp,0,1),p2=b.hp<b.maxHp*.5;
  const BW=340,BH=18,BX=(W-BW)/2,BY=50;
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(BX-16,BY-26,BW+32,BH+42);
  ctx.strokeStyle='rgba(255,50,50,0.4)';ctx.lineWidth=1;ctx.strokeRect(BX-16,BY-26,BW+32,BH+42);
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font='bold 13px "Segoe UI",sans-serif';ctx.fillStyle=p2?'#ff8866':'#ff4444';
  ctx.fillText((p2?'⚡ ':'💀 ')+LEVEL_CFG[level].bossName+(p2?' — ENRAGED!':''),W/2,BY-12);
  ctx.fillStyle='rgba(60,0,0,0.8)';ctx.fillRect(BX,BY,BW,BH);
  const flk=p2?(0.85+0.15*Math.sin(frame*0.35)):1;
  ctx.fillStyle=p2?`rgba(255,${Math.floor(50*flk)},0,${flk})`:'#cc2222';
  ctx.fillRect(BX,BY,BW*pct,BH);
  ctx.strokeStyle='rgba(255,100,100,0.4)';ctx.lineWidth=1.5;ctx.strokeRect(BX,BY,BW,BH);
  ctx.font='bold 11px "Segoe UI",sans-serif';ctx.fillStyle='rgba(255,255,255,0.8)';
  ctx.fillText(Math.max(0,b.hp)+' / '+b.maxHp,W/2,BY+BH/2);
}

// ── DRAW: HUD ──────────────────────────────────────────────────────────────
function drawHUD(){
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,W,44);
  ctx.textBaseline='middle';
  ctx.font='bold 21px "Segoe UI",sans-serif';ctx.textAlign='left';ctx.fillStyle='#f9c74f';
  ctx.fillText('⭐ '+score,14,22);
  ctx.font='bold 14px "Segoe UI",sans-serif';ctx.textAlign='center';ctx.fillStyle='#4cc9f0';
  ctx.fillText('LVL '+level,W/2,22);
  ctx.textAlign='right';ctx.fillStyle='#90be6d';ctx.fillText('Best: '+best,W-80,22);
  ctx.font='20px serif';
  // draw lives with pulse when lifePulse > 0
  let hs='';
  for(let i=0;i<MAX_LIVES;i++) hs += i<lives ? '❤️' : '🖤';
  ctx.save();
  if(typeof lifePulse!=='undefined' && lifePulse>0){
    const s = 1 + 0.12*Math.sin((lifePulse/4));
    ctx.translate(W-8,18); ctx.scale(s,s); ctx.translate(-(W-8),-18);
  }
  ctx.fillText(hs,W-8,18);
  ctx.restore();
  // Gun level bar
  if(gunLevel>1||gunTimer>0){
    const gc=GUN_CFG[gunLevel];
    const bx=10,by=H-30,bw=160,bh=12;
    const hue=gunLevel===4?(frame*2)%360:0;
    const lc=gunLevel===4?`hsl(${hue},100%,65%)`:gc.glowCol||'#f9c74f';
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(bx-2,by-18,bw+50,bh+22);
    ctx.font='bold 11px "Segoe UI",sans-serif';ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillStyle=lc;ctx.fillText('🔫 '+gc.label+' (LV'+gunLevel+')',bx,by-9);
    ctx.fillStyle='rgba(255,255,255,0.12)';ctx.fillRect(bx,by,bw,bh);
    const pct=gunTimer/GUN_DURATION;
    const flash=pct<0.15?(0.5+0.5*Math.sin(frame*0.5)):1;
    ctx.globalAlpha=flash;ctx.fillStyle=pct>0.5?lc:pct>0.25?'#f9c74f':'#f94144';
    ctx.fillRect(bx,by,bw*pct,bh);ctx.globalAlpha=1;
    ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,bh);
  }
}

// ── GAME LOGIC ─────────────────────────────────────────────────────────────
function initGame(fromLevel){
  if(!fromLevel){level=1;score=0;best=parseInt(localStorage.getItem('catblaster-best')||'0');}
  state='playing';lives=3;frame=0;killCount=0;
  shakeX=0;shakeY=0;shakePow=0;screenFlash=0;recoil=0;
  mFlash=0;mFlashX=0;mFlashY=0;phase2Banner=0;
  bossWarningTimer=0;boss=null;gunLevel=1;gunTimer=0;
  bullets=[];enemies=[];particles=[];casings=[];bossProjectiles=[];powerups=[];
  cat.y=H/2;cat.sTimer=0;
}

function shoot(){
  const gc=GUN_CFG[gunLevel];
  const mx=cat.x+MDX,my=cat.y+MDY;
  gc.offsets.forEach(dy=>bullets.push({x:mx,y:my+dy,vx:gc.vx,r:gc.r,lvl:gunLevel}));
  mFlash=1;mFlashX=mx;mFlashY=my;
  recoil=-6-(gunLevel-1)*1.5;
  // mouth animation when shooting
  cat.mouthTimer = 10;
  for(let c=0;c<=Math.floor((gunLevel-1)/2);c++)
    casings.push({x:cat.x+44,y:cat.y+14+c*5,vx:rnd(-4,-1.5),vy:rnd(-5,-2),angle:Math.random()*Math.PI*2,spin:(Math.random()-.5)*.6,life:1});
  SFX.shoot();
}

function spawnPowerup(x,y,type){
  const t = type || 'gun';
  powerups.push({x,y:clamp(y,80,GROUND_Y-40),vx:-1.8,bobPhase:Math.random()*Math.PI*2,life:1,collected:false,collectAnim:0,type:t});
}

function spawnEnemy(){
  if(boss||bossWarningTimer>0||enemies.length>=22)return; // allow more on higher levels
  const cfg=LEVEL_CFG[level],r=Math.random();
  // Introduce elite enemies on higher levels and especially level 10
  let kind;
  if(level>=10){
    if(r<0.18) kind='fastBat';
    else if(r<0.36) kind='armoredRat';
    else if(r<0.58) kind='rat';
    else kind='mouse';
  } else if(level>=7){
    if(r<0.12) kind='fastBat';
    else if(r<0.3) kind='rat';
    else if(r<0.5) kind='bat';
    else kind='mouse';
  } else {
    kind=(score>10&&r<0.2)?'bat':(score>15&&r<0.42)?'rat':'mouse';
  }
  const size = kind==='rat'?60:kind==='bat'?38:kind==='fastBat'?34:kind==='armoredRat'?72:46;
  let baseSpd;
  if(kind==='bat') baseSpd = rnd(3.5,6);
  else if(kind==='fastBat') baseSpd = rnd(5.5,8.5);
  else if(kind==='rat') baseSpd = rnd(1,2.2);
  else if(kind==='armoredRat') baseSpd = rnd(1,1.6);
  else baseSpd = rnd(1.5,3.2);
  const spd = baseSpd * cfg.enemySpeedMult;
  let maxHp = (kind==='rat'?3:1);
  if(kind==='armoredRat') maxHp = 6;
  if(kind==='fastBat') maxHp = 2;
  const pts = kind==='armoredRat'?6:(kind==='rat'?3:kind==='fastBat'?2:(kind==='bat'?2:1));
  const y = rnd(60,GROUND_Y-40);
  enemies.push({x:W+60,y,kind,size,spd,hp:maxHp,maxHp,pts,hit:0,baseY:y,oscPh:Math.random()*Math.PI*2,oscA:(kind==='bat'||kind==='fastBat')?rnd(22,48):0});
}

function spawnBoss(){
  const cfg=LEVEL_CFG[level];
  boss={x:W+180,y:H/2,targetX:560,size:cfg.bossSize,hp:cfg.bossHP,maxHp:cfg.bossHP,
  speed:cfg.bossSpeed,fireRate:cfg.bossFireRate,projSpeed:cfg.bossProjSpeed,
  fireTimer:60,chargeTimer:350,state:'entering',hit:0,dead:false,
  dyingAlpha:1,dyingTimer:0,phase2Triggered:false,hitRadius:cfg.bossSize*1.1};
// decide attack pattern by level (keeps code readable)
const patterns = {
  5: 'pierce',     // faster, piercing shots
  6: 'summon',     // summons small faster enemies (spawnEnemy)
  7: 'stomp',      // heavy circle stomp blasts
  8: 'ash',        // ash cloud slow projectiles
  9: 'void',       // homing shots
 10: 'apex'        // mixed / harder
};
boss.pattern = patterns[level] || null;
// special burst and FX for Blood King and other bosses
SFX.bossRoar();shakePow=20;
if(appearance==='fierce' && roarOnBoss && !muted){
  tone(70,'sawtooth',0.6,0.45);setTimeout(()=>tone(110,'sine',0.28,0.32),180);
}
// entrance FX per pattern for flair
if(boss.pattern==='pierce'){ if(!muted) tone(360,'triangle',0.18,0.24);} 
if(boss.pattern==='summon'){ for(let i=0;i<4;i++)setTimeout(()=>explode(boss.x-60 + rnd(-30,30), boss.y + rnd(-50,50), false), i*90);} 
if(boss.pattern==='stomp'){ for(let i=0;i<6;i++)setTimeout(()=>explode(boss.x-40 + rnd(-40,40), boss.y + rnd(-40,40), true), i*50);} 
if(boss.pattern==='ash'){ for(let i=0;i<8;i++)setTimeout(()=>particles.push({x:boss.x+rnd(-40,40),y:boss.y+rnd(-50,50),vx:rnd(-0.6,0.6),vy:rnd(-0.6,0.6),life:1,c:'#d9d0b0',r:rnd(2,6)}), i*60);} 
if(boss.pattern==='void'){ if(!muted) tone(140,'sine',0.2,0.28);} 
if(boss.pattern==='apex'){
  for(let i=0;i<8;i++)setTimeout(()=>explode(boss.x-40 + rnd(-50,50), boss.y + rnd(-60,60), true), i*50);
  if(!muted){tone(120,'sawtooth',0.5,0.42);setTimeout(()=>tone(240,'triangle',0.28,0.22),140);}  
}
}

function explode(x,y,big){
  const n=big?28:16;
  const cols=['#f9c74f','#f8961e','#f3722c','#ffffff','#4cc9f0','#ff6688'];
  for(let i=0;i<n;i++){const a=rnd(0,Math.PI*2),s=rnd(2,big?10:7);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,c:cols[rint(0,cols.length-1)],r:rnd(2,big?6:4)});}
}

function takeDamage(){
  lives--;screenFlash=1;shakePow=16;SFX.loseLife();
  // mouth flinch
  cat.mouthTimer = Math.max(cat.mouthTimer, 18);
  if(lives<=0){if(score>best){best=score;localStorage.setItem('catblaster-best',best);}state='gameover';SFX.gameOver();}
}

function updateBoss(){
  if(!boss)return;
  if(boss.hit>0)boss.hit--;
  if(boss.state==='dying'){
    boss.dyingTimer--;boss.dyingAlpha=clamp(boss.dyingTimer/80,0,1);
    if(boss.dyingTimer%14===0)explode(boss.x+rnd(-50,50),boss.y+rnd(-60,60),true);
    if(boss.dyingTimer<=0){
          boss.dead=true;score+=50;if(score>best){best=score;localStorage.setItem('catblaster-best',best);} 
          state='level_clear';
          SFX.victory();
          // special trophy for beating Level 10
          if(level===MAX_LEVEL){
            try{
              const prev = parseInt(localStorage.getItem('dino-apex-beaten-count')||'0',10)||0;
              localStorage.setItem('dino-apex-beaten-count',(prev+1).toString());
              localStorage.setItem('dino-apex-beaten','1');
            }catch(e){}
            // celebratory particles and audio (use file if present)
            for(let i=0;i<40;i++)explode(boss.x+rnd(-140,140),boss.y+rnd(-120,120),true);
            tryPlayAudio('audioApex', ()=>{ if(!muted){[360,420,480,600,720].forEach((f,i)=>setTimeout(()=>tone(f,'triangle',0.2,0.2),i*140));}});
          }
        }
    return;
  }
  if(boss.state==='entering'){boss.x-=3.5;if(boss.x<=boss.targetX){boss.x=boss.targetX;boss.state='fighting';}return;}
  if(boss.state==='fighting'){
    boss.y+=Math.sin(frame*0.025)*0.6;boss.y=clamp(boss.y,80,GROUND_Y-80);
    const p2threshold=LEVEL_CFG[level].p2At;
    if(boss.hp<boss.maxHp*p2threshold&&!boss.phase2Triggered){
          boss.phase2Triggered=true;phase2Banner=110;
          boss.fireRate=Math.floor(boss.fireRate*.5);boss.projSpeed*=1.4;
          shakePow=22;screenFlash=.9;
          // base roar
          SFX.bossRoar();
          // extra enraged FX if fierce skin + roar enabled
          if(appearance==='fierce' && roarOnBoss && !muted){
            tone(60,'sawtooth',0.6,0.45);setTimeout(()=>tone(180,'sine',0.32,0.28),140);
          }
          // extra Blood King enraged FX visuals
          if(level===4){
            for(let i=0;i<18;i++){particles.push({x:boss.x + rnd(-boss.size,boss.size), y:boss.y + rnd(-boss.size,boss.size), vx:rnd(-6,6), vy:rnd(-6,6), life:1, c:'#ff6666', r:rnd(2,6)});}        
            if(!muted){[300,420,560,720].forEach((f,i)=>setTimeout(()=>tone(f,'sine',0.12,0.16),i*80));}
            shakePow=34;screenFlash=1.0;
          }
        }
    boss.fireTimer--;
    if(boss.fireTimer<=0){
      boss.fireTimer=boss.fireRate;
      const px=boss.x-boss.size*1.6,py=boss.y-boss.size*.55;
      const dx=cat.x-px,dy=cat.y-py,dist=Math.sqrt(dx*dx+dy*dy)||1;
      const shots=boss.phase2Triggered?(level>=3?5:3):1;
      for(let s=0;s<shots;s++){const spread=(s-Math.floor(shots/2))*.28;bossProjectiles.push({x:px,y:py,vx:(dx/dist)*boss.projSpeed,vy:(dy/dist)*boss.projSpeed+spread,r:12});}
    }
    // Level 3+ : circle blast (stronger on level 4)
    if(level>=3){
      if(!boss.circleTimer) boss.circleTimer = (level===4?200:260);
      boss.circleTimer--;
      if(boss.circleTimer<=0){
        boss.circleTimer = boss.phase2Triggered ? (level===4?120:180) : (level===4?200:260);
        const px=boss.x-boss.size*1.2,py=boss.y;
        // choose pattern-specific blasts
        if(boss.pattern==='pierce'){
          // many narrow fast shots
          const blastShots = boss.phase2Triggered?20:12;
          for(let i=0;i<blastShots;i++){
            const ang=(i/blastShots)*Math.PI*2 + (boss.phase2Triggered?Math.random()*0.4:0);
            bossProjectiles.push({x:px,y:py,vx:Math.cos(ang)*boss.projSpeed*1.4,vy:Math.sin(ang)*boss.projSpeed*1.4,r:8});
          }
          shakePow=18; screenFlash=0.45;
        } else if(boss.pattern==='summon'){
          // spawn extra enemies near boss (lightweight) for a short time
          for(let s=0;s<3;s++)spawnEnemy();
          // small radial shots
          for(let i=0;i<10;i++){const ang=(i/10)*Math.PI*2;bossProjectiles.push({x:px,y:py,vx:Math.cos(ang)*boss.projSpeed*0.9,vy:Math.sin(ang)*boss.projSpeed*0.9,r:8});}
          shakePow=16; screenFlash=0.35;
        } else if(boss.pattern==='stomp'){
          // heavy slow ring
          const blastShots = boss.phase2Triggered?18:12;
          for(let i=0;i<blastShots;i++){const ang=(i/blastShots)*Math.PI*2;bossProjectiles.push({x:px,y:py,vx:Math.cos(ang)*boss.projSpeed*0.6,vy:Math.sin(ang)*boss.projSpeed*0.6,r:14});}
          shakePow=36; screenFlash=0.95;
        } else if(boss.pattern==='ash'){
          // create many slow ash particles (using bossProjectiles as harmless clouds)
          for(let i=0;i<12;i++){const ang=Math.random()*Math.PI*2;bossProjectiles.push({x:px,y:py,vx:Math.cos(ang)*boss.projSpeed*0.35,vy:Math.sin(ang)*boss.projSpeed*0.35,r:18,ash:true});}
          shakePow=12; screenFlash=0.25;
        } else if(boss.pattern==='void'){
          // fire homing projectiles
          const shots = boss.phase2Triggered?8:5;
          for(let i=0;i<shots;i++){const ang=(i/shots)*Math.PI*2;bossProjectiles.push({x:px,y:py,vx:Math.cos(ang)*boss.projSpeed*0.9,vy:Math.sin(ang)*boss.projSpeed*0.9,r:12,homing:true});}
          shakePow=20; screenFlash=0.6;
        } else if(boss.pattern==='apex'){
          // big mixed blast: homing + ring
          for(let i=0;i<10;i++){const ang=(i/10)*Math.PI*2;bossProjectiles.push({x:px,y:py,vx:Math.cos(ang)*boss.projSpeed,vy:Math.sin(ang)*boss.projSpeed,r:12});}
          for(let i=0;i<6;i++){bossProjectiles.push({x:px,y:py,vx:rnd(-2,2),vy:rnd(-2,2),r:10,homing:true});}
          shakePow=40; screenFlash=1.0;
        } else {
          // default (existing behavior)
          const blastShots = boss.phase2Triggered ? (level===4?18:12) : (level===4?12:8);
          const speedMul = level===4?1.1:0.75;
          for(let i=0;i<blastShots;i++){
            const ang=(i/blastShots)*Math.PI*2;
            bossProjectiles.push({x:px,y:py,vx:Math.cos(ang)*boss.projSpeed*speedMul,vy:Math.sin(ang)*boss.projSpeed*speedMul,r:(level===4?12:10)});
          }
          shakePow = level===4?30:18; screenFlash = level===4?0.9:0.5;
        }
      }
    }
    boss.chargeTimer--;
    if(boss.chargeTimer<=0){boss.chargeTimer=boss.phase2Triggered?220:350;boss.state='charging';boss.chargeDir=-1;}
  }
  if(boss.state==='charging'){
    boss.x+=boss.chargeDir*18;
    if(boss.chargeDir===-1&&boss.x<=200)boss.chargeDir=1;
    if(boss.chargeDir===1&&boss.x>=boss.targetX){boss.x=boss.targetX;boss.state='fighting';}
    const dx=boss.x-cat.x,dy=boss.y-cat.y;
    if(Math.sqrt(dx*dx+dy*dy)<boss.size*.9+25)takeDamage();
  }
}

function update(){
  frame++;
  if(screenFlash>0)screenFlash-=0.07;
  if(recoil<0)recoil+=1.8;else recoil=0;
  if(shakePow>0.5){shakeX=(Math.random()-.5)*shakePow;shakeY=(Math.random()-.5)*shakePow;shakePow*=.74;}
  else{shakeX=0;shakeY=0;shakePow=0;}
  if(phase2Banner>0)phase2Banner--;

  if(bossWarningTimer>0){bossWarningTimer--;if(bossWarningTimer===0)spawnBoss();return;}

  if(K['ArrowUp']||K['KeyW'])cat.y-=cat.speed;
  if(K['ArrowDown']||K['KeyS'])cat.y+=cat.speed;
  cat.y=clamp(cat.y,58,GROUND_Y-38);

  cat.sTimer++;if(cat.sTimer>=GUN_CFG[gunLevel].rate){shoot();cat.sTimer=0;}

  // mouth timer decrement
  if(cat.mouthTimer>0)cat.mouthTimer--;

  // breathing sound timer
  if((cat.breathTimer||0)<=0){
    // schedule next breath based on breathSpeed slider
    cat.breathTimer = Math.max(60, breathSpeed + Math.floor(Math.random()*(breathSpeed*0.6)));
    if(!muted && soundUnlocked){
      tone(220,'sine',0.18,Math.min(0.28, breathVolume));setTimeout(()=>tone(300,'triangle',0.12,Math.min(0.18, breathVolume*0.7)),Math.max(160,Math.round(220*breathVolume+80)));
    }
  } else cat.breathTimer--;

  // lifePulse decrement
  if(typeof lifePulse!=='undefined' && lifePulse>0) lifePulse--;

  if(boss)updateBoss();

  const sr=Math.max(22,LEVEL_CFG[level].spawnBase-score*2);
  if(frame%sr===0)spawnEnemy();

  // bullets
  for(let i=bullets.length-1;i>=0;i--){bullets[i].x+=bullets[i].vx;if(bullets[i].x>W+20)bullets.splice(i,1);}

  // bullets vs boss
  if(boss&&!boss.dead&&boss.state!=='entering'){
      for(let j=bullets.length-1;j>=0;j--){
        const b=bullets[j],dx=b.x-boss.x,dy=b.y-boss.y;
        if(Math.sqrt(dx*dx+dy*dy)<boss.hitRadius){
          const cfg = GUN_CFG[b.lvl]||GUN_CFG[1];
          const dmg = cfg.dmg || (b.lvl>=3?2:1);
          bullets.splice(j,1);boss.hp-=dmg;boss.hit=8;shakePow=5;SFX.bossHit();
          if(boss.hp<=0&&boss.state!=='dying'){boss.state='dying';boss.dyingTimer=120;boss.dyingAlpha=1;explode(boss.x,boss.y,true);explode(boss.x-40,boss.y+30,true);shakePow=28;}
        }
      }
    }

  // enemies
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];e.x-=e.spd;if(e.hit>0)e.hit--;
    if(e.oscA>0){e.oscPh+=0.06;e.y=e.baseY+Math.sin(e.oscPh)*e.oscA;}
    if(e.x<-65){enemies.splice(i,1);takeDamage();continue;}
    for(let j=bullets.length-1;j>=0;j--){
          const b=bullets[j],dx=b.x-e.x,dy=b.y-e.y;
          if(Math.sqrt(dx*dx+dy*dy)<e.size*.54){
            const cfg = GUN_CFG[b.lvl]||GUN_CFG[1];
            const dmg = cfg.dmg || (b.lvl>=3?2:1);
            bullets.splice(j,1);e.hp-=dmg;e.hit=8;
            if(e.hp<=0){explode(e.x,e.y,e.kind==='rat');score+=e.pts;killCount++;enemies.splice(i,1);SFX.hit();
                          // spawn a life booster more often from armoredRat or rat on Level 5
                          if(level===5){
                            if((e.kind==='armoredRat' && Math.random()<0.55) || (e.kind==='rat' && Math.random()<0.35)) spawnPowerup(e.x,e.y,'life');
                            else if(Math.random()<(e.kind==='rat'?.55:.22)) spawnPowerup(e.x,e.y,'gun');
                          } else {
                            if(Math.random()<(e.kind==='rat'?.55:.22)) spawnPowerup(e.x,e.y,'gun');
                          }
                          const bk=LEVEL_CFG[level].killsForBoss;
                          if(killCount>=bk&&!boss&&bossWarningTimer===0){enemies=[];bossWarningTimer=150;warnBossName=LEVEL_CFG[level].bossName;}
                        }
            break;
          }
        }
  }

  // boss projectiles
  for(let i=bossProjectiles.length-1;i>=0;i--){
      const p=bossProjectiles[i];
      // homing behavior
      if(p.homing){
        const dx = cat.x - p.x, dy = cat.y - p.y; const d = Math.sqrt(dx*dx+dy*dy)||1;
        // steer slightly towards player
        p.vx += (dx/d) * 0.22; p.vy += (dy/d) * 0.22;
        // clamp speed
        const sp = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
        const maxsp = 14; if(sp>maxsp){p.vx = p.vx/sp*maxsp; p.vy = p.vy/sp*maxsp;}
      }
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<-40||p.y<-40||p.y>H+40){bossProjectiles.splice(i,1);continue;}
      if(Math.sqrt((p.x-cat.x)**2+(p.y-cat.y)**2)<(p.r||12)+18){
        // ash clouds are less damaging; homing/projectile do damage
        if(!p.ash) takeDamage();
        bossProjectiles.splice(i,1);
        continue;
      }
    }

  // gun timer
  if(gunTimer>0){gunTimer--;if(gunTimer===0){gunLevel=Math.max(1,gunLevel-1);if(gunLevel>1)gunTimer=GUN_DURATION;SFX.gunDown();}}

  // powerups
  for(let i=powerups.length-1;i>=0;i--){
    const p=powerups[i];
    if(!p.collected){
          p.x+=p.vx;if(p.x<-40){powerups.splice(i,1);continue;}
          const dx=p.x-cat.x,dy=(p.y+Math.sin(frame*.09+p.bobPhase)*8)-cat.y;
          if(Math.abs(dx)<55&&Math.abs(dy)<55){
            p.collected=true;shakePow=8;cat.mouthTimer = Math.max(cat.mouthTimer, 14);
            // effect depends on powerup type
            if(p.type==='life'){
                      // increase lives up to MAX_LIVES
                      const prevLives = lives;
                      lives = Math.min(MAX_LIVES, (lives||0) + 1);
                                            // play audio file if available, otherwise fallback to synth
                                            tryPlayAudio('audioLife', SFX.lifePickup);
                                            // HUD pulse
                                            lifePulse = 48;
                      for(let k=0;k<28;k++){const a=rnd(0,Math.PI*2),s=rnd(3,11);particles.push({x:p.x,y:p.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,c:'#ff6b6b',r:rnd(2,8)});} 
                    } else {
                      gunLevel=Math.min(4,gunLevel+1);gunTimer=GUN_DURATION;SFX.pickup();
                      for(let k=0;k<16;k++){const a=rnd(0,Math.PI*2),s=rnd(2,7);particles.push({x:p.x,y:p.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,c:'#f9c74f',r:rnd(2,5)});} 
                    }
          }
        }else{p.collectAnim+=0.12;p.life-=0.09;if(p.life<=0){powerups.splice(i,1);continue;}}
  }

  // hard caps
  if(particles.length>150)particles.splice(0,particles.length-150);
  if(casings.length>35)casings.splice(0,casings.length-35);

  // particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.vx*=.97;p.life-=.028;
    if(p.life<=0)particles.splice(i,1);
  }
  // casings
  for(let i=casings.length-1;i>=0;i--){
    const c=casings[i];c.x+=c.vx;c.y+=c.vy;c.vy+=.32;c.angle+=c.spin;
    if(c.y>GROUND_Y){c.vy*=-.38;c.spin*=.55;c.vx*=.7;}
    c.life-=.009;if(c.life<=0)casings.splice(i,1);
  }
}

// ── MAIN DRAW ──────────────────────────────────────────────────────────────
function draw(){
  ctx.save();ctx.translate(shakeX,shakeY);
  drawBackground();
  if(screenFlash>0){ctx.fillStyle=`rgba(190,18,18,${screenFlash*.2})`;ctx.fillRect(0,0,W,H);}
  drawCasings();drawBullets();
  bossProjectiles.forEach(drawBossProj);
  enemies.forEach(e=>{
      if(e.kind==='bat' || e.kind==='fastBat') drawBat(e.x,e.y,e.size,e.hit);
      else drawMouse(e.x,e.y,e.size,e.hp,e.maxHp,(e.kind==='rat'||e.kind==='armoredRat'),e.hit);
    });
  if(boss&&!boss.dead)drawBoss(boss);
  powerups.forEach(drawPowerup);
  drawGun(cat.x,cat.y);drawCat(cat.x,cat.y);
  drawMuzzleFlash();drawParticles();
  ctx.restore();
  drawHUD();
  if(boss&&!boss.dead)drawBossHPBar(boss);
  drawBossWarning();drawPhase2Banner();
  if(state==='level_clear')drawLevelClear();
  if(state==='gameover')drawGameOver();
}

// ── ADVANCE / RESTART ──────────────────────────────────────────────────────
function tryAdvance(){
  if(state==='gameover'){initGame(false);return;}
  if(state==='level_clear'){if(level<MAX_LEVEL){level++;initGame(true);}else{initGame(false);}}
}

  requestAnimationFrame(loop);
  if(ts-_lastFrame<18)return; // ~55fps cap
  _lastFrame=ts;
  if(state==='playing')update();
  draw();
}

        }catch(e){console.error('force enable failed',e);}  
      });
      // also let clicking the overlay hide it for convenience when debug complete
      _adState.addEventListener('dblclick',()=>{document.getElementById('audio-debug').style.display='none';});
    </script>

    </body>
