<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MathKids 🎮</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background:
        linear-gradient(135deg, rgba(10,10,30,0.85) 0%, rgba(15,30,70,0.80) 100%),
        url('einstein.jpg') center center / cover no-repeat fixed;
      color: #fff;
      overflow: hidden;
    }

    /* ── stars ── */
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star {
      position: absolute; width: 3px; height: 3px;
      border-radius: 50%; background: #fff; opacity: 0;
      animation: twinkle var(--d) infinite var(--delay) ease-in-out;
    }
    @keyframes twinkle {
      0%,100% { opacity: 0; } 50% { opacity: 0.7; }
    }

    /* ── card ── */
    .card {
      position: relative; z-index: 1;
      text-align: center;
      padding: clamp(12px, 4vw, 20px) clamp(12px, 4vw, 24px) clamp(20px, 5vw, 36px);
      width: 100%;
    }

    h1 {
      font-size: clamp(2.4rem, 8vw, 3.8rem);
      font-weight: 900;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #f9c74f, #f8961e, #f3722c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 1rem;
      opacity: 0.5;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: clamp(24px, 6vw, 52px);
    }

    /* ── game buttons ── */
    .games {
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
      width: 100%;
    }

    .game-btn {
      display: flex;
      flex-direction: row;
      align-items: center;
      text-decoration: none;
      color: #fff;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 18px 24px;
      width: min(380px, 90vw);
      gap: 18px;
      transition: transform 0.18s, background 0.18s, border-color 0.18s;
      cursor: pointer;
      min-height: 80px;
    }
    .game-btn:hover {
      transform: translateY(-3px) scale(1.02);
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.28);
    }
    .game-btn:active { transform: scale(0.97); }

    .game-btn .icon {
      font-size: 3rem;
      flex-shrink: 0;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
    }

    .game-btn .text { text-align: left; }

    .game-btn .name {
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .game-btn .desc {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.72);
      line-height: 1.45;
    }

    .math-btn  { border-color: rgba(76, 201, 240, 0.3); }
    .math-btn .name  { color: #4cc9f0; }
    .math-btn:hover  { border-color: #4cc9f0; }

    .dino-btn   { border-color: rgba(249, 199, 79, 0.3); }
        .dino-btn .name   { color: #f9c74f; }
        .dino-btn:hover   { border-color: #f9c74f; }

    /* Tablet and up — side-by-side cards */
    @media (min-width: 520px) {
      .games {
        flex-direction: row;
        justify-content: center;
        gap: 24px;
      }
      .game-btn {
        flex-direction: column;
        justify-content: center;
        padding: 32px 28px;
        width: 210px;
        min-height: 200px;
        gap: 0;
      }
      .game-btn .icon {
        font-size: 3.6rem;
        margin-bottom: 14px;
      }
      .game-btn .text { text-align: center; }
      .game-btn .name { margin-bottom: 8px; }
    }

    /* ── footer ── */
    .footer {
      position: fixed;
      bottom: 18px;
      font-size: 0.72rem;
      opacity: 0.25;
      letter-spacing: 1px;
      z-index: 1;
    }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="card">
  <h1>🎮 MathKids</h1>
  <p class="tagline">learn · play · win</p>

  <div class="games">

    <a class="game-btn math-btn" href="math-quiz.html">
      <div class="icon">🧮</div>
      <div class="text">
        <div class="name">Math Quiz</div>
        <div class="desc">Answer maths questions · beat the 20‑second timer!</div>
      </div>
    </a>

    <a class="game-btn dino-btn" href="dino-game.html">
          <div class="icon">🦖🔫</div>
          <div class="text">
            <div class="name">Dino Blaster</div>
            <div class="desc">Shoot evil rats & bats · collect power-ups · beat 4 bosses!</div>
          </div>
        </a>

  </div>
</div>

<p class="footer">Made with ❤️ by a 4th grader from Germany</p>

<!-- Trophy badge for beating Apex + modal with stats and reset -->
<div id="trophyModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);align-items:center;justify-content:center;z-index:9999;">
  <div style="background:#0b1220;color:#fff;border-radius:12px;padding:18px;max-width:420px;width:92%;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,0.6);">
    <h2 style="margin-bottom:8px;">🏆 Apex Conqueror</h2>
    <div id="trophyStats" style="margin-bottom:12px;font-size:0.95rem;opacity:0.95;"></div>
    <div style="display:flex;gap:8px;justify-content:center;">
      <button id="closeTrophy" style="padding:8px 12px;border-radius:8px;background:#4cc9f0;color:#062;border:none;font-weight:700;">Close</button>
      <button id="resetTrophy" style="padding:8px 12px;border-radius:8px;background:#ff6666;color:#062;border:none;font-weight:700;">Reset Achievements</button>
    </div>
  </div>
</div>

<script>
  try{
    const stuck = localStorage.getItem('dino-apex-beaten');
    const count = parseInt(localStorage.getItem('dino-apex-beaten-count')||'0',10)||0;
    if(stuck==='1'){
      const card = document.querySelector('.card');
      const badge = document.createElement('div');
      badge.style.cssText = 'position:absolute;right:18px;top:18px;background:linear-gradient(90deg,#ffd166,#f9c74f);color:#0b0a1e;padding:8px 12px;border-radius:8px;font-weight:800;box-shadow:0 6px 18px rgba(0,0,0,0.35);cursor:pointer;';
      badge.innerText = '🏆 Apex Conqueror!';
      badge.addEventListener('click', ()=>{
        const modal = document.getElementById('trophyModal');
        const stats = document.getElementById('trophyStats');
        const best = localStorage.getItem('catblaster-best')||0;
        stats.innerHTML = `<div style="margin-bottom:6px;">Times beaten: <strong>${count}</strong></div><div>Best score: <strong>${best}</strong></div>`;
        modal.style.display = 'flex';
      });
      card.appendChild(badge);
    }
  }catch(e){}
  // modal handlers
  try{
    document.getElementById('closeTrophy').addEventListener('click', ()=>{document.getElementById('trophyModal').style.display='none';});
    document.getElementById('resetTrophy').addEventListener('click', ()=>{
      if(confirm('Reset achievements?')){localStorage.removeItem('dino-apex-beaten');localStorage.removeItem('dino-apex-beaten-count');location.reload();}
    });
  }catch(e){}
</script>

<script>
  // stars
  const wrap = document.getElementById('stars');
  for (let i = 0; i < 70; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*5}s;`;
    wrap.appendChild(s);
  }
</script>
</body>
</html>
